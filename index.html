<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCGANGPOPPER</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#0b0b0b; color:#ffffff; }
.section { padding:60px 20px; }
.list-group-item{cursor:pointer;background:#111;color:#fff;border-color:#222}
.list-group-item:hover{background:#1a1a1a}
.active-song{background:#b30000 !important;color:#fff}
#details{position:sticky; top:10px; z-index:10}
.card{background:#111;border:1px solid #b30000}
.btn-primary{background:#b30000;border:none}
.btn-primary:hover{background:#e60000}
.btn-danger{background:#ff1a1a;border:none}
.btn-danger:hover{background:#ff3333}
h1,h2,h4{color:#ff1a1a}
p{color:#ffffff}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-black navbar-expand-lg">
<div class="container-fluid">
<a class="navbar-brand text-danger">RCGANGPOPPER</a>
<div class="ms-auto">
<a class="btn btn-outline-danger me-2" href="#intro">Intro</a>
<a class="btn btn-outline-danger" href="#explore">Explore</a>
</div>
</div>
</nav>

<section id="intro" class="section text-center">
<h1>RCGANGPOPPER 🎶</h1>
<p>Learn Russian language & culture through music timelines.</p>
<button class="btn btn-primary" onclick="goExplore()">Start</button>
</section>

<section id="explore" class="section">
<h2 class="text-center">500 Songs Timeline</h2>
<div class="text-center mb-3">
<button class="btn btn-primary" onclick="loadSongs()">Explore Songs</button>
<button class="btn btn-danger" onclick="clearSongs()">Clear</button>
</div>

<div class="row">

<div class="col-md-6" style="max-height:70vh; overflow-y:auto">
<div id="songList" class="list-group"></div>
</div>

<div class="col-md-6">
<div id="details"></div>
</div>

</div>

</section>

<script>

const words1=["Golden","Silent","Red","Blue","Midnight","Velvet","Broken","Wild","Lonely","Electric"];
const words2=["River","Sky","Heart","Dream","Night","Echo","City","Fire","Voice","Shadow"];

const songs=[];
const culture=[];
const year=[];

for(let i=1;i<=500;i++){
 let era="";
 let y=1800+Math.floor((i/500)*226);

 if(i<=100) era="Folk Russia – traditions, village storytelling";
 else if(i<=200) era="Imperial/Soviet shift – revolution & identity";
 else if(i<=300) era="Soviet era – war, unity, propaganda";
 else if(i<=400) era="Post-Soviet – western influence";
 else era="Modern Russia – internet & youth culture";

 let title=`${words1[i%10]} ${words2[i%10]} ${i}`;
 songs.push(title);
 culture.push(era);
 year.push(y);
}

songs[499]="MATULUKA ULTRA FUNK SLOWED REVERB";
culture[499]="Modern 2026 – remix/internet culture";
year[499]=2026;

function goExplore(){
 document.getElementById('explore').scrollIntoView({behavior:'smooth'});
}

function firstTwoWords(str){
 return str.split(" ").slice(0,2).join(" ");
}

function loadSongs(){
 let html="";
 songs.forEach((s,i)=>{
 html+=`<div class='list-group-item' id='song-${i}' onclick="show(${i})">${i+1}. ${firstTwoWords(s)}</div>`;
 });
 document.getElementById("songList").innerHTML=html;
}

function clearSongs(){
 document.getElementById("songList").innerHTML="";
 document.getElementById("details").innerHTML="";
}

function show(i){
 document.querySelectorAll('.list-group-item').forEach(el=>el.classList.remove('active-song'));
 document.getElementById(`song-${i}`).classList.add('active-song');

 document.getElementById("details").innerHTML=`
 <div class='card p-3'>
 <h4>${songs[i]}</h4>
 <p><b>Year:</b> ${year[i]}</p>
 <p><b>Culture Insight:</b> ${culture[i]}</p>
 <a href='https://www.youtube.com/results?search_query=${encodeURIComponent(songs[i])}' target='_blank' class='btn btn-danger'>View Song</a>
 </div>`;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
