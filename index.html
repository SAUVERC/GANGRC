<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCGANGPOPPER</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#0d0d0d; color:white; }
.section { padding:60px 20px; }
.song-detail { margin-top:20px; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black navbar-expand-lg">
<div class="container-fluid">
<a class="navbar-brand">RCGANGPOPPER</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>
<div id="nav" class="collapse navbar-collapse">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#intro">Intro</a></li>
<li class="nav-item"><a class="nav-link" href="#explore">Explore</a></li>
</ul>
</div>
</div>
</nav>

<!-- INTRO SECTION -->
<section id="intro" class="section text-center">
<h1>RCGANGPOPPER 🎶</h1>
<p>Learn Russian Language & Culture through Pop Songs.</p>
<p>This platform lets you explore Russian music from historical folk roots → Soviet era → modern hip-hop.</p>
<button class="btn btn-primary" onclick="scrollToExplore()">Start Exploring</button>
</section>

<!-- EXPLORE SECTION -->
<section id="explore" class="section">
<h2 class="text-center">Explore Songs (500+ Chronological)</h2>
<div class="text-center mb-3">
<button class="btn btn-success" onclick="loadSongs()">Load Songs</button>
<button class="btn btn-warning" onclick="clearSongs()">Clear</button>
</div>

<div id="songList" class="list-group"></div>
<div id="details" class="song-detail"></div>
</section>

<script>

// GENERATE 500 SONGS
const songs = [];
const culture = [];

for(let i=1;i<=500;i++){
    let era = "";
    if(i<=100) era = "Folk & Imperial Russia - storytelling, rural life, traditions";
    else if(i<=200) era = "Soviet Era - unity, war, patriotism, collectivism";
    else if(i<=300) era = "Post-Soviet 90s - western influence, chaos, pop rise";
    else if(i<=400) era = "2000s Global Russia - pop, eurovision, identity";
    else era = "Modern Russia - trap, drill, internet culture, youth expression";

    songs.push(`Russian Song ${i}`);
    culture.push(era);
}

function scrollToExplore(){
    document.getElementById('explore').scrollIntoView({behavior:'smooth'});
}

function loadSongs(){
    let list="";
    songs.forEach((song,i)=>{
        list+=`<button class='list-group-item list-group-item-action' onclick="showDetail(${i})">${i+1}. ${song}</button>`;
    });
    document.getElementById("songList").innerHTML=list;
}

function clearSongs(){
    document.getElementById("songList").innerHTML="";
    document.getElementById("details").innerHTML="";
}

function showDetail(i){
    document.getElementById("details").innerHTML=`
    <div class='card bg-dark text-light p-3'>
    <h4>${songs[i]}</h4>
    <p><b>Culture Insight:</b> ${culture[i]}</p>
    <a href='https://www.youtube.com/results?search_query=${songs[i]}' target='_blank' class='btn btn-danger'>Open Song</a>
    </div>`;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
